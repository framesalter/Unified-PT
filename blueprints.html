<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Builders - Blueprints</title>

    <link rel="icon" href="logo1.jpg" type="image/png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
 
    

    <!-- HEADER / NAVIGATION -->
    <header>
        <h1 class="logo">VISION BUILDERS</h1>
        <nav>
            <a href="index.html" class="nav-link">HOME PAGE</a>
            <a href="blueprints.html" class="nav-link active">BLUEPRINTS</a>
            <a href="model.html" class="nav-link">MODEL</a>
            <a href="blog.html" class="nav-link">BLOG</a>
        </nav>
    </header>

    <!-- BLUEPRINTS PAGE -->
    <main class="blueprints-page">
        
        <!-- Page Header with Animation -->
        <div class="blueprints-header">
            <div class="header-decoration">
                <span class="deco-line"></span>
                <span class="deco-icon">✦</span>
                <span class="deco-line"></span>
            </div>
            <h1 class="blueprints-title">FLOOR PLANS</h1>
            <p class="blueprints-subtitle">Explore the detailed blueprints of your future home</p>
        </div>

        <!-- Floor Plan Image Container -->
        <div class="floorplan-container">
            
            <!-- First Floor -->
            <div class="floorplan-item">
                <div class="floorplan-image">
                    <img src="firstfloor.png" alt="First Floor Plan" data-caption="FIRST FLOOR">
                </div>
                <h3 class="floorplan-label">FIRST FLOOR</h3>
            </div>

            <!-- Second Floor -->
            <div class="floorplan-item">
                <div class="floorplan-image">
                    <img src="secondfloor.png" alt="Second Floor Plan" data-caption="SECOND FLOOR">
                </div>
                <h3 class="floorplan-label">SECOND FLOOR</h3>
            </div>
            
        </div>
        
        <!-- Floating Tagline -->
        <div class="blueprint-tagline">
            <span class="tagline-icon">✦</span>
            "BAHAY PARA SA KINABUKASAN" BLUEPRINT
            <span class="tagline-icon">✦</span>
        </div>
        
    </main>

    

    <!-- Footer -->
    <footer>
    <div class="footer-content">
        <div class="footer-divider">
            <span class="fd-line"></span>
            <span class="fd-icon">✦</span>
            <span class="fd-line"></span>
        </div>
        <p class="footer-copyright">&copy; 2026 Vision Builders. All rights reserved.</p>
        <p class="footer-credit">
            <span class="credit-text">crafted with precision by</span>
            <a href="https://github.com/framesalter" target="_blank" class="credit-brand">
                ✦ framesdroid ✦
            </a>
        </p>
    </div>
    </footer>

    <script src="script.js"></script>

        <!-- IMAGE LIGHTBOX -->
    <div id="imageLightbox" class="lightbox">
        <span class="lightbox-close" id="lightboxClose">✕</span>
        <span class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</span>
        <span class="lightbox-nav lightbox-next" id="lightboxNext">›</span>
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightboxImage" src="" alt="">
            <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
